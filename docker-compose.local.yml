services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: aigitgateway
      POSTGRES_USER: aigitgateway
      POSTGRES_PASSWORD: local-postgres-change-me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aigitgateway -d aigitgateway"]
      interval: 5s
      timeout: 5s
      retries: 12
    security_opt:
      - no-new-privileges:true
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  web:
    ports:
      - "8000:8000"
    read_only: false
    environment:
      DJANGO_SETTINGS_MODULE: aigitgateway.settings.local
      APP_URL: http://localhost:8000
      SERVICE_URL_WEB_8000: http://localhost:8000
      SECRET_KEY: local-compose-only-key
      DATABASE_URL: postgresql://aigitgateway:local-postgres-change-me@db:5432/aigitgateway
      CREATE_SUPERUSER: "1"
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_PASSWORD: change-me-now
      GITHUB_AUTH_MODE: token
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
